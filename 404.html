<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Page Not Found</title>
        <style>
            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 1.5rem;
                box-sizing: border-box;
                font-family: sans-serif;
                background: #f5f5f5;
                color: #222;
            }

            main {
                width: min(100%, 40rem);
                background: #fff;
                border-radius: 12px;
                box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
                padding: 2rem;
            }

            h1 {
                margin: 0 0 1rem;
                font-size: 1.5rem;
            }

            p {
                margin: 0 0 1rem;
                line-height: 1.6;
            }

            a {
                color: #1f4d99;
            }
        </style>
    </head>
    <body>
        <main>
            <h1>Page Not Found</h1>
            <p id="statusMessage">Check the URL or go to the database top page.</p>
            <p><a href="/match_db/">Go to Match DB</a></p>
        </main>
        <script>
            (() => {
                const path = window.location.pathname || "";
                const statusMessage = document.getElementById("statusMessage");
                const legacyPattern = /\/HnKGenerator(?=\/|$)|\/HnkGenerator(?=\/|$)/;
                const cleanRedirects = {
                    "/codes.html": "/codes/",
                    "/iad_frame.html": "/iad_frame/",
                    "/opening_matchup.html": "/opening_matchup/",
                };
                const redirectTo = (target) => {
                    const suffix = `${window.location.search || ""}${window.location.hash || ""}`;
                    window.location.replace(`${target}${suffix}`);
                };

                if (!legacyPattern.test(path)) {
                    return;
                }

                let targetPath = path.replace(legacyPattern, "");
                if (!targetPath) {
                    targetPath = "/";
                }

                if (cleanRedirects[targetPath]) {
                    targetPath = cleanRedirects[targetPath];
                }

                if (statusMessage) {
                    statusMessage.textContent = "Redirecting from the legacy HnKGenerator URL...";
                }
                redirectTo(targetPath);
            })();
        </script>
    </body>
</html>
